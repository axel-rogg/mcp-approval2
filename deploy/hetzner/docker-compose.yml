# docker-compose.yml — mcp-approval2 + mcp-knowledge2 Hetzner-Stack
#
# Boot order:  postgres (healthcheck) → openbao → mcp-approval2 → mcp-knowledge2 → caddy
# Network:     internal (bridge) — Caddy is the only public-facing service via :80/:443
# State:       pgdata, vault-data, caddy-data, caddy-config (named volumes)
#
# Run:   docker compose --env-file .env up -d
# Logs:  docker compose logs -f <service>
# Stop:  docker compose down            (keeps volumes)
#        docker compose down -v         (DESTRUCTIVE: removes pgdata + vault-data!)
#
# `version:` key dropped — Compose v2 ignores it and prints a deprecation
# warning on every `up`. Schema is implicit-latest.

services:
  caddy:
    image: caddy:2-alpine
    container_name: mcp-caddy
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      mcp-approval2:
        condition: service_started
      mcp-knowledge2:
        condition: service_started
    restart: unless-stopped
    networks: [internal]

  postgres:
    image: pgvector/pgvector:pg16
    container_name: mcp-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: approval2
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d approval2']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [internal]

  openbao:
    image: quay.io/openbao/openbao:latest
    container_name: mcp-openbao
    cap_add: [IPC_LOCK]
    # `disable_mlock` Konfig-Option wurde in OpenBao Ende 2026 entfernt.
    # mlock ist jetzt immer aktiv; deshalb braucht der Container IPC_LOCK
    # (oben) und der Host darf nicht swappen — VM-default ist ohnehin
    # kein swap-File konfiguriert.
    environment:
      BAO_LOCAL_CONFIG: |
        storage "file" { path = "/vault/data" }
        listener "tcp" { address = "0.0.0.0:8200" tls_disable = 1 }
        ui = true
        api_addr = "http://openbao:8200"
    volumes:
      - vault-data:/vault/data
    command: server
    restart: unless-stopped
    networks: [internal]

  mcp-approval2:
    image: ghcr.io/axel-rogg/mcp-approval2:${TAG:-latest}
    container_name: mcp-approval2
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    environment:
      # ── Database ────────────────────────────────────────────
      DATABASE_URL: postgres://app:${POSTGRES_PASSWORD}@postgres:5432/approval2
      # ── Vault / OpenBao ─────────────────────────────────────
      VAULT_ADDR: http://openbao:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
      # ── Server ──────────────────────────────────────────────
      PORT: 8787
      BASE_URL: https://${DOMAIN_MCP}
      WEBAUTHN_RP_ID: ${DOMAIN_MCP}
      # Multi-Origin Allowlist (CSV). Pflicht-Eintraege: alle Caddy-vhosts
      # die mcp-approval2 forwarden — DOMAIN_MCP, DOMAIN_APP und (optional)
      # HETZNER_FQDN_V4 fuer Coop-Bypass. Server parsed das in
      # apps/server/src/lib/config.ts. Siehe runbook-coop-bypass.md.
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      # ── JWT RS256 (Sessions + DCR-Facade-Tokens + OBO-Signing fuer KC2) ──
      # AS-3: Derselbe Key signt jetzt sowohl approval2's DCR-OAuth-Facade-
      # Tokens (aud=mcp-approval2) als auch die OBO-JWTs an KC2
      # (aud=mcp-knowledge2). Public-half wird unter
      # /.well-known/jwks.json published — KC2's MCP_APPROVAL_JWKS_URL
      # zeigt darauf.
      JWT_RS256_PRIVATE_KEY_PEM: ${JWT_RS256_PRIVATE_KEY_PEM}
      JWT_RS256_PUBLIC_KEY_PEM: ${JWT_RS256_PUBLIC_KEY_PEM}
      JWT_KID: ${JWT_KID}
      # AS-3: SELF_OAUTH_ISSUER ist die canonical iss fuer alle Tokens die
      # approval2's Facade emittiert (inkl. OBO-Tokens). KC2-Verifier matched
      # darauf. Format: 'https://<DOMAIN_MCP>'.
      SELF_OAUTH_ISSUER: https://${DOMAIN_MCP}
      # Legacy-Alias (intern noch genutzt) — wird zum Cutover entfernt.
      JWT_ISSUER: https://${DOMAIN_MCP}
      # ── JWT HS256 (Sessions, OAuth-access-tokens, /internal/credentials) ──
      # 32-byte hex random. Required by zod schema (config.ts:22). Used by
      # auth/session/issuer.ts, mcp/oauth/token.ts, routes/internal/credentials.ts.
      JWT_SECRET: ${JWT_SECRET}
      # ── KEK / Credential-Encryption (LocalKekProvider fallback) ───────────
      # Until the OpenBao boot-path is wired through @mcp-approval2/adapters
      # (see index.ts:69-77), MASTER_KEY_BASE64 is the credential KEK source.
      # 32 raw bytes, base64-encoded. Required for /v1/credentials/*, GDPR
      # routes, and /internal/v1/dek/*.
      MASTER_KEY_BASE64: ${MASTER_KEY_BASE64}
      # ── AS-3 S2S an KC2 (Shared SERVICE_TOKEN + KC-Adapter-URL) ────────
      # SERVICE_TOKEN ist Two-Factor mit dem OBO-JWT. KC2 erwartet exakt
      # diesen String im Authorization-Header. ROTATE TOGETHER mit KC2.
      MCP_KNOWLEDGE_URL: http://mcp-knowledge2:8788
      MCP_KNOWLEDGE_SERVICE_TOKEN: ${MCP_KNOWLEDGE_SERVICE_TOKEN}
      # ── Internal Service Token (Sub-MCP ↔ Approval) ─────────
      MCP_APPROVAL_INTERNAL_TOKEN: ${MCP_APPROVAL_INTERNAL_TOKEN}
      # ── KC2 Legacy-Alias (wird zum Cutover entfernt) ────────
      KNOWLEDGE_URL: http://mcp-knowledge2:8788
      # ── Sub-MCPs auf Cloudflare (cross-cloud HTTPS) ─────────
      GATEWAY_CF_URL: https://cf.ai-toolhub.org
      GATEWAY_GITHUB_URL: ${GATEWAY_GITHUB_URL:-}
      GATEWAY_GWS_URL: https://gws.ai-toolhub.org
      GATEWAY_UTILS_URL: https://utils.ai-toolhub.org
      GATEWAY_GCLOUD_URL: https://gcloud.ai-toolhub.org
      # ── Google OAuth (Front-Door Login) ─────────────────────
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      # ── Vertex AI (optional; mount SA-JSON via volume) ──────
      VERTEX_AI_PROJECT_ID: ${VERTEX_AI_PROJECT_ID:-}
      VERTEX_AI_REGION: ${VERTEX_AI_REGION:-europe-west4}
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/vertex-sa.json
      # ── Logging ─────────────────────────────────────────────
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
    volumes:
      - ./secrets/vertex-sa.json:/secrets/vertex-sa.json:ro
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:8787/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      openbao:
        condition: service_started
    restart: unless-stopped
    networks: [internal]

  mcp-knowledge2:
    image: ghcr.io/axel-rogg/mcp-knowledge2:${KNOWLEDGE_TAG:-latest}
    container_name: mcp-knowledge2
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    environment:
      # ── DB (separate logical DB on same postgres instance) ───
      DATABASE_URL: postgres://app:${POSTGRES_PASSWORD}@postgres:5432/knowledge2
      DATABASE_ADMIN_URL: postgres://app:${POSTGRES_PASSWORD}@postgres:5432/knowledge2
      DATABASE_POOL_MAX: 20
      # ── AS-3 K3/K4: own DCR-OAuth-Facade (Claude.ai direct path) ──────
      SELF_OAUTH_ISSUER: https://${DOMAIN_KNOWLEDGE}
      GOOGLE_OAUTH_CLIENT_ID: ${KC_GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_OAUTH_CLIENT_SECRET: ${KC_GOOGLE_OAUTH_CLIENT_SECRET}
      GOOGLE_OAUTH_REDIRECT_URI: https://${DOMAIN_KNOWLEDGE}/auth/google/callback
      # Optional Workspace-domain allowlist (K-D1).
      GOOGLE_HD_ALLOWLIST: ${GOOGLE_HD_ALLOWLIST:-}
      JWKS_CACHE_TTL_SECONDS: 86400
      # ── AS-3 K7: OBO (Proxy path from approval2) ─────────────
      # When set, KC2 accepts X-On-Behalf-Of + service-token from approval2.
      MCP_APPROVAL_JWKS_URL: http://mcp-approval2:8787/.well-known/jwks.json
      MCP_APPROVAL_ISSUER: https://${DOMAIN_MCP}
      # ── Shared SERVICE_TOKEN (must match approval2 MCP_KNOWLEDGE_SERVICE_TOKEN) ──
      SERVICE_TOKEN: ${MCP_KNOWLEDGE_SERVICE_TOKEN}
      # ── AS-3 K9: KMS provider ────────────────────────────────
      # Pilot/shared-OpenBao: 'openbao' + OPENBAO_ADDR + OPENBAO_TOKEN.
      # Dev/solo:             'hkdf_local' + KMS_MASTER_KEY_B64.
      KMS_PROVIDER: ${KC_KMS_PROVIDER:-openbao}
      OPENBAO_ADDR: http://openbao:8200
      OPENBAO_TOKEN: ${VAULT_TOKEN}
      OPENBAO_TRANSIT_PATH: ${KC_OPENBAO_TRANSIT_PATH:-transit}
      KMS_MASTER_KEY_B64: ${KC_KMS_MASTER_KEY_B64:-}
      # ── Blob (S3-compatible; can re-use approval2's MinIO if pilot) ──
      BLOB_ENDPOINT: ${KC_BLOB_ENDPOINT}
      BLOB_REGION: ${KC_BLOB_REGION:-eu-central}
      BLOB_ACCESS_KEY: ${KC_BLOB_ACCESS_KEY}
      BLOB_SECRET_KEY: ${KC_BLOB_SECRET_KEY}
      BLOB_BUCKET: ${KC_BLOB_BUCKET:-knowledge2}
      BLOB_PATH_STYLE: "true"
      # ── Vertex (Embedding-Provider) ──────────────────────────
      VERTEX_PROJECT: ${VERTEX_AI_PROJECT_ID:-}
      VERTEX_LOCATION: ${VERTEX_AI_REGION:-europe-west4}
      VERTEX_MODEL: ${VERTEX_MODEL:-text-multilingual-embedding-002}
      VERTEX_SERVICE_ACCOUNT_JSON_PATH: /secrets/vertex-sa.json
      # ── Backup master key (also encrypts the signing_keys at rest, K1) ──
      BACKUP_MASTER_KEY: ${KNOWLEDGE_BACKUP_MASTER_KEY_BASE64}
      BACKUP_BUCKET: ${KC_BACKUP_BUCKET:-knowledge2-backup}
      BACKUP_RETENTION_DAYS: 30
      # ── Server ───────────────────────────────────────────────
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: 8788
      NODE_ENV: production
    volumes:
      - ./secrets/vertex-sa.json:/secrets/vertex-sa.json:ro
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:8788/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      openbao:
        condition: service_started
    restart: unless-stopped
    networks: [internal]

  # ──────────────────────────────────────────────────────────────────────
  # Watchtower — auto-update mcp-approval2 + mcp-knowledge2 (NOT postgres/
  # openbao/caddy; those are infrastructure and must be updated manually).
  # Opt-in via com.centurylinklabs.watchtower.enable=true label.
  # See README.md "Auto-Updates via Watchtower" + watchtower-notifications.md
  # ──────────────────────────────────────────────────────────────────────
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - watchtower-data:/data
    environment:
      # Polling-Intervall (Sekunden, Default 300 = 5 min)
      WATCHTOWER_POLL_INTERVAL: ${WATCHTOWER_POLL_INTERVAL:-300}
      # Nur Container mit Label überwachen (opt-in pattern)
      WATCHTOWER_LABEL_ENABLE: "true"
      # Neue Images pullen + alte aufräumen
      WATCHTOWER_CLEANUP: "true"
      # Rolling-Update — nicht alle Container gleichzeitig
      WATCHTOWER_ROLLING_RESTART: "true"
      # Stop-Timeout für graceful shutdown
      WATCHTOWER_TIMEOUT: 30s
      # Auth für private Registry (ghcr.io)
      REPO_USER: ${GHCR_USER:-}
      REPO_PASS: ${GHCR_TOKEN:-}
      # Optional: Notifications (siehe watchtower-notifications.md)
      WATCHTOWER_NOTIFICATIONS: ${WATCHTOWER_NOTIFICATIONS:-}
      WATCHTOWER_NOTIFICATION_URL: ${WATCHTOWER_NOTIFICATION_URL:-}
      WATCHTOWER_NOTIFICATIONS_LEVEL: ${WATCHTOWER_NOTIFICATIONS_LEVEL:-info}
      # Watchtower-Log-Level
      WATCHTOWER_LOG_LEVEL: ${WATCHTOWER_LOG_LEVEL:-info}
    networks: [internal]
    labels:
      # Watchtower NICHT selbst auto-update (rekursiv-gefährlich)
      com.centurylinklabs.watchtower.enable: "false"

volumes:
  pgdata:
  vault-data:
  caddy-data:
  caddy-config:
  watchtower-data:

networks:
  internal:
    driver: bridge
