# Dependabot — wöchentliche Dep-Updates für npm
#
# Gruppen reduzieren PR-Lärm: zusammengehörige Pakete (drizzle*, @types/*,
# hono*, jose/@noble/*) landen in einer PR statt 5+.
#
# Limit 5 offene PRs verhindert Backlog-Stau. GH-Actions-Updates separat,
# damit Workflow-Bumps nicht zwischen npm-Updates untergehen.

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      drizzle:
        patterns:
          - 'drizzle*'
      typescript:
        patterns:
          - 'typescript'
          - '@types/*'
      hono:
        patterns:
          - 'hono*'
      crypto:
        patterns:
          - 'jose'
          - '@noble/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore(ci)
      include: scope
