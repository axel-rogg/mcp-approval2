name: Smoke gegen Fly.io Production

# ════════════════════════════════════════════════════════════════════════════
# Smoke-Tests gegen den Fly-Deploy (privat-Mode, Stand 2026-05-17).
# Architektur-Wahrheit: docs/privat.md
#
# Pflicht-Anforderung (User-Decision 2026-05-15):
# Smoke darf KEINE Approvals erzeugen — siehe scripts/smoke-prod.sh-Fix in
# mcp-approval (v1), Commit 96907d4. Layer-2-Tests (Read-Only-Endpoints +
# tools_help-Reachability) only.
#
# Trigger:
#   - workflow_dispatch (manuell)
#   - daily 06:00 UTC (catches drift)
#
# Ein Smoke-Failure öffnet ein GH-Issue (Label `smoke-failure`).
# ════════════════════════════════════════════════════════════════════════════

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'   # daily 06:00 UTC

permissions:
  contents: read
  issues: write

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install bc + jq
        run: sudo apt-get update && sudo apt-get install -y bc jq

      - name: Run Smoke
        env:
          SMOKE_DOMAIN_MCP:            ${{ secrets.SMOKE_DOMAIN_MCP }}
          SMOKE_DOMAIN_KNOWLEDGE:      ${{ secrets.SMOKE_DOMAIN_KNOWLEDGE }}
          MCP_APPROVAL_INTERNAL_TOKEN: ${{ secrets.MCP_APPROVAL_INTERNAL_TOKEN }}
        run: |
          # Default-Domains für Fly-Deploy. Override via GH-Secret falls
          # Custom-Domain noch nicht aktiv und .fly.dev temporär verwendet wird.
          export SMOKE_DOMAIN_MCP="${SMOKE_DOMAIN_MCP:-mcp2.ai-toolhub.org}"
          export SMOKE_DOMAIN_KNOWLEDGE="${SMOKE_DOMAIN_KNOWLEDGE:-knowledge2.ai-toolhub.org}"
          bash scripts/pilot-smoke-fly.sh

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: 'Fly Smoke FAILED',
              body:  `Run [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) failed. Check fly logs: \`fly logs -a mcp-approval2\``,
              labels: ['smoke-failure']
            })
