name: Smoke gegen Hetzner Production

# CRON DISABLED 2026-05-15 — VM wurde am 2026-05-14 destroyed
# (siehe docs/runbooks/runbook-vm-destroy-recreate.md). Der schedule-
# Trigger feuerte am 2026-05-14 07:18 UTC noch einmal trotz powered-off-VM
# und schlug fehl, GitHub auto-disabled den Workflow danach. Damit der
# Workflow auf einem zukuenftigen Push nicht versehentlich re-enabled wird
# (Auto-Disable haengt am workflow-id-State, nicht am File): schedule-Block
# komplett auskommentiert. Re-Enable nach VM-Re-Provisioning: Block
# einkommentieren + commit + push.
on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 6 * * *'   # daily 06:00 UTC

permissions:
  contents: read
  issues: write

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install bc + jq
        run: sudo apt-get update && sudo apt-get install -y bc jq

      - name: Run Smoke
        env:
          SMOKE_DOMAIN_MCP:            ${{ secrets.SMOKE_DOMAIN_MCP }}
          SMOKE_DOMAIN_KNOWLEDGE:      ${{ secrets.SMOKE_DOMAIN_KNOWLEDGE }}
          MCP_APPROVAL_INTERNAL_TOKEN: ${{ secrets.MCP_APPROVAL_INTERNAL_TOKEN }}
        run: bash scripts/pilot-smoke-hetzner-remote.sh

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: 'Hetzner smoke FAILED',
              body:  `Run [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) failed. Check logs.`,
              labels: ['smoke-failure']
            })
