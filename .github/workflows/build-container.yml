name: Build & Push Container

# Trigger-Konvention (siehe CLAUDE.md "Branch / Push"):
# - workflow_dispatch (manuell)
# - push.tags 'v*' (Release-Tag)
# - push.main mit '[deploy]' in der Commit-Subject (analog Deploy-Workflow)
#
# Ohne '[deploy]'-Tag: Workflow startet, Job skipped sofort — kein Docker-Build,
# kein GHCR-Push. Spart Compute + reduziert Lärm in der Actions-UI.

on:
  push:
    tags: ['v*']
    branches: [main]
    paths:
      - 'apps/server/**'
      - 'packages/**'
      - 'deploy/fly/Dockerfile.server'
      - '.github/workflows/build-container.yml'
  workflow_dispatch:

# Concurrency: bei schnellen Folge-Pushes alte Builds canceln (sparen Build-Minuten)
concurrency:
  group: build-container-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip wenn push.main UND [deploy] in KEINEM Commit des Pushes.
    # github.event.commits ist die volle Commit-Liste (nicht nur head_commit) —
    # faengt Multi-Commit-Pushes ab, bei denen [deploy] in einem buried Commit
    # steckt und der head_commit kein Tag traegt (v1-Lesson aus mcp-approval).
    # Tag-Pushes ('v*') und workflow_dispatch laufen immer durch.
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/') ||
      contains(join(github.event.commits.*.message, ' '), '[deploy]')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/fly/Dockerfile.server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
