name: Deploy to Hetzner

on:
  # Trigger 1: Manuelle Auslösung via GH-Console
  workflow_dispatch:
    inputs:
      skip_migrations:
        description: 'Skip DB migrations'
        type: boolean
        default: false
      target_branch:
        description: 'Branch to deploy (default: main)'
        type: string
        default: 'main'

  # Trigger 2: Push to main mit [deploy-hetzner] in Commit-Subject
  push:
    branches: [main]
    paths:
      - 'apps/server/**'
      - 'apps/web/**'
      - 'packages/**'
      - 'deploy/hetzner/**'
      - '.github/workflows/deploy-hetzner.yml'

# Concurrency: ein Deploy gleichzeitig pro Branch
concurrency:
  group: deploy-hetzner-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    # Skip wenn push-Event UND [deploy-hetzner] nicht in commit-msg
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[deploy-hetzner]')

    environment:
      name: hetzner-production
      url: https://${{ secrets.HETZNER_DOMAIN_APP }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch || 'main' }}

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}

      - name: Add VM to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.HETZNER_VM_HOST }}" >> ~/.ssh/known_hosts

      - name: Pre-deploy smoke
        run: |
          # Verify VM reachable before attempting deploy
          ssh -o ConnectTimeout=10 deploy@${{ secrets.HETZNER_VM_HOST }} 'echo "✓ SSH OK"'

      - name: Pre-deploy backup (DB only)
        run: |
          ssh deploy@${{ secrets.HETZNER_VM_HOST }} \
            'cd /opt/mcp-approval2/deploy/hetzner && bash backup.sh --db-only --label=pre-deploy-${{ github.sha }}'
        # backup.sh skippt wenn nicht vorhanden — non-blocking
        continue-on-error: true

      - name: Deploy
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          SKIP_MIGRATIONS: ${{ inputs.skip_migrations || 'false' }}
        run: |
          ssh deploy@${{ secrets.HETZNER_VM_HOST }} \
            SKIP_MIGRATIONS=$SKIP_MIGRATIONS \
            GHCR_TOKEN=$GHCR_TOKEN \
            'cd /opt/mcp-approval2 && \
             git fetch origin && \
             git reset --hard origin/${{ inputs.target_branch || 'main' }} && \
             cd deploy/hetzner && \
             bash update.sh'

      - name: Verify deployment
        run: |
          sleep 10
          ssh deploy@${{ secrets.HETZNER_VM_HOST }} \
            'cd /opt/mcp-approval2/deploy/hetzner && bash healthcheck.sh'

      - name: Smoke test against remote
        env:
          SMOKE_DOMAIN_MCP: ${{ secrets.HETZNER_DOMAIN_MCP }}
          SMOKE_DOMAIN_KNOWLEDGE: ${{ secrets.HETZNER_DOMAIN_KNOWLEDGE }}
          MCP_APPROVAL_INTERNAL_TOKEN: ${{ secrets.MCP_APPROVAL_INTERNAL_TOKEN }}
        run: |
          sudo apt-get install -y bc jq
          bash scripts/pilot-smoke-hetzner-remote.sh

      - name: Notify on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.substring(0, 7);
            console.log(`✓ Deployed ${sha} to Hetzner production`);

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.substring(0, 7);
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deploy FAILED: ${sha}`,
              body: `## Deploy to Hetzner failed\n\n` +
                    `**Commit:** ${context.sha}\n` +
                    `**Workflow:** ${context.runId}\n` +
                    `**Triggered by:** ${context.actor}\n\n` +
                    `Check logs: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['deploy-failure', 'hetzner']
            });
