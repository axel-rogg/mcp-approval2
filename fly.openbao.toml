# =============================================================================
# fly.openbao.toml — Fly.io app for OpenBao (KEK-provider sidecar)
# =============================================================================
# Plan-Ref: deploy/fly/README.md §2, openbao-config.hcl.
#
# Separate Fly-App so its lifecycle is independent from mcp-approval2 (we
# never want to restart Vault as a side-effect of an app-deploy). Reached
# only over `*.internal` — no public listener.
#
# Persistence: `vault_data` volume mounted at /vault/data. Backups via
# `fly volumes snapshots list -a mcp-approval2-openbao`.
#
# CRITICAL: After first deploy, run `bao operator init` to generate unseal
# keys + root token. Store them OUT-OF-BAND (1Password, paper, etc.). On
# every restart Vault is sealed — run `bao operator unseal` 3× to re-open.
# =============================================================================

app            = "mcp-approval2-openbao"
primary_region = "fra"
kill_signal    = "SIGTERM"
kill_timeout   = 30

[build]
  dockerfile = "deploy/fly/Dockerfile.openbao"

[env]
  BAO_ADDR = "http://127.0.0.1:8200"

# ──────────────────────────────────────────────────────────────────────────
# Volume — file-backend storage for raft-less single-node OpenBao.
# 1 GB is plenty for KEKs + AppRole-secrets; bump if you start signing
# bulk-data via Transit.
# ──────────────────────────────────────────────────────────────────────────
[mounts]
  source      = "vault_data"
  destination = "/vault/data"
  initial_size = "1gb"

# ──────────────────────────────────────────────────────────────────────────
# Service — internal-only (no [http_service]). We expose port 8200 over
# Fly-private-network so mcp-approval2-openbao.internal:8200 resolves
# inside the VPC, but nothing public.
# ──────────────────────────────────────────────────────────────────────────
[[services]]
  internal_port = 8200
  protocol      = "tcp"
  auto_stop_machines  = false   # Vault must stay running.
  auto_start_machines = true
  min_machines_running = 1

  [[services.tcp_checks]]
    grace_period  = "10s"
    interval      = "30s"
    timeout       = "5s"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"
  cpus   = 1

[deploy]
  strategy = "immediate"   # we don't want rolling — restart = seal anyway.
